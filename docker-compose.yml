# Local end-to-end stack for ds-contract-engine.
#
# Brings up all three services on a private Docker network so the Generator
# can register tokens in the stub Clearing House and the Validator can fetch
# the Generator's JWKS using in-cluster service names.
#
# Usage:
#   docker compose up --build
#
# Then mint and validate from your host:
#   ./examples/end-to-end.sh          # uses localhost:8082, localhost:8083

services:
  ds-clearing-house-stub:
    build: ./server/clearing-house-stub
    image: ds-clearing-house-stub:dev
    container_name: ds-clearing-house-stub
    environment:
      DS__LOG_LEVEL: INFO
      DS__ENVIRONMENT: development
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8084/health-check/').status == 200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10

  ds-contract-generator:
    build: ./server/contract-generator
    image: ds-contract-generator:dev
    container_name: ds-contract-generator
    depends_on:
      ds-clearing-house-stub:
        condition: service_healthy
    environment:
      # NODE_ID is set to `localhost` for the local-dev experience: any
      # request you make through Swagger UI / curl on the host machine
      # naturally uses item URLs like http://localhost/<dataset> which
      # then pass the Generator's node-ownership check. In production
      # the Helm values override this with a real hostname (e.g.
      # hus.nextgen.hiro-develop.nl).
      DS__NODE_ID: localhost
      DS__SIGNING_KEY_PATH: /keys/ed25519.pem
      DS__SIGNING_KEY_ID: localhost#key-1
      DS__CLEARING_HOUSE_URL: http://ds-clearing-house-stub:8084
      DS__DEFAULT_TTL_SECONDS: 3600
      DS__MAX_ITEMS_PER_CONTRACT: 50
      DS__ENVIRONMENT: production
      DS__LOG_LEVEL: INFO
    ports:
      - "8082:8082"
    volumes:
      # Generator auto-creates an Ed25519 key on first run. Persisting it
      # in a named volume keeps the same key across container restarts.
      - generator-keys:/keys
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8082/health-check/').status == 200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10

  ds-contract-validator:
    build: ./server/contract-validator
    image: ds-contract-validator:dev
    container_name: ds-contract-validator
    depends_on:
      ds-contract-generator:
        condition: service_healthy
      ds-clearing-house-stub:
        condition: service_healthy
    environment:
      # Must equal the Generator's NODE_ID so the audience check passes
      # (Generator stamps aud = its own NODE_ID).
      DS__NODE_ID: localhost
      DS__CLEARING_HOUSE_URL: http://ds-clearing-house-stub:8084
      # JWKS still has to reach the Generator container, which lives at
      # its Docker DNS name on the compose network — the URL diverges
      # from NODE_ID here because there is no production-style TLS
      # hostname resolving to the Generator pod in local dev.
      DS__JWKS_BASE_URL_TEMPLATE: http://ds-contract-generator:8082
      DS__LEEWAY_SECONDS: 5
      DS__JWKS_CACHE_TTL_SECONDS: 3600
      DS__HTTP_TIMEOUT_SECONDS: 5.0
      DS__ENVIRONMENT: production
      DS__LOG_LEVEL: INFO
    ports:
      - "8083:8083"

volumes:
  generator-keys:
