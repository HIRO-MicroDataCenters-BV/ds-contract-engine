apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "app.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "app.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ include "app.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ .Values.container.command }}
          args:
            {{- toYaml .Values.container.args | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            {{- include "app.commonEnv" . | nindent 12 }}
          {{- if or .Values.signingKeySecret.enabled .Values.catalogFields.useConfigMap }}
          volumeMounts:
            {{- if .Values.signingKeySecret.enabled }}
            - name: signing-key
              mountPath: {{ .Values.signingKeySecret.mountPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.catalogFields.useConfigMap }}
            - name: catalog-fields
              mountPath: {{ .Values.catalogFields.mountPath }}
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or .Values.signingKeySecret.enabled .Values.catalogFields.useConfigMap }}
      volumes:
        {{- if .Values.signingKeySecret.enabled }}
        - name: signing-key
          secret:
            secretName: {{ .Values.signingKeySecret.name }}
        {{- end }}
        {{- if .Values.catalogFields.useConfigMap }}
        - name: catalog-fields
          configMap:
            name: {{ include "app.fullname" . }}-catalog-fields
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
