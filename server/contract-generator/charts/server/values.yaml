replicaCount: 1

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: ""
nameOverride: ""
fullnameOverride: "ds-contract-generator"

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

container:
  command: ["uvicorn"]
  args: ["app.main:app", "--host", "0.0.0.0", "--port", "8082"]

service:
  type: ClusterIP
  port: 8082

livenessProbe:
  httpGet:
    path: /health-check/
    port: 8082

readinessProbe:
  httpGet:
    path: /health-check/
    port: 8082

# --- Application configuration -----------------------------------------
# Maps to the DS__* env vars consumed by app/settings.py
contractGenerator:
  # The provider node identity; used as iss, aud, and JWKS host.
  nodeId: "localhost"
  # Where the Ed25519 private key is mounted inside the pod.
  signingKeyPath: "/keys/ed25519.pem"
  # The kid published in the JWT header and the JWKS endpoint.
  signingKeyId: "localhost#key-1"
  # Per-node Clearing House URL for jti registration.
  clearingHouseUrl: "http://ds-clearing-house:8080"
  # Default contract TTL when Checkout does not specify.
  defaultTtlSeconds: 3600
  # Maximum number of catalog items per contract.
  maxItemsPerContract: 50
  # development | staging | production
  environment: "production"
  logLevel: "INFO"

# --- Signing key Secret mount ------------------------------------------
# In production the Ed25519 private key is mounted from a Kubernetes Secret.
# Set signingKeySecret.name to an existing Secret containing key `ed25519.pem`.
signingKeySecret:
  enabled: true
  name: "ds-contract-generator-signing-key"
  mountPath: "/keys"

# --- Dynamic catalog-field schema --------------------------------------
# The Generator embeds catalog item attributes into the token's
# vc.credentialSubject.catalogItem[] entries. The schema is config-driven
# so the consortium can change which attributes are included without a
# code release.
#
# Two ways to provide the schema:
#
#   useConfigMap: false  (default)
#     The Generator reads the YAML baked into the image at
#     /code/app/core/catalog_fields.yaml. Use this when the in-repo
#     schema is what you want.
#
#   useConfigMap: true
#     The chart creates a ConfigMap from `fieldsYaml` below and mounts
#     it at `mountPath`. The Generator reads from there instead. Use
#     this when consortium agreement changes the schema and you don't
#     want to rebuild the image.
catalogFields:
  useConfigMap: false
  mountPath: "/etc/ds-contract-generator"
  # Only used when useConfigMap is true. The contents must be valid
  # YAML matching app/core/catalog_fields.yaml's schema.
  fieldsYaml: |
    fields:
      - name: id
        source: id
        required: true
      - name: identifier
        source: identifier
        required: true
      - name: title
        source: title
        required: true
      - name: hash
        source: hash
        required: true

# --- Resource limits ---------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# --- ServiceMonitor (Prometheus operator) -------------------------------
# Disabled by default — flip to true once the infra team confirms the
# prometheus-operator is installed and the ServiceMonitor CRD is available.
serviceMonitor:
  enabled: false
  namespace: ""        # defaults to the release namespace
  interval: 30s
  scrapeTimeout: 10s
  labels: {}           # extra labels Prometheus uses to select monitors
  metricRelabelings: []
  relabelings: []

nodeSelector: {}
tolerations: []
affinity: {}

ingress:
  # Default off — opt-in per site via gitops values.
  # Host is constructed as: ds-contract-generator.{namespace}.{host}
  # e.g. ds-contract-generator.hus.nextgen.hiro-develop.nl
  enabled: false
  host: nextgen.hiro-develop.nl
