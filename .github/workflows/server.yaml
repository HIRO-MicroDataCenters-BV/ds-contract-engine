name: Test and build servers

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
    paths-ignore:
      - 'releases/**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: hiro-microdatacenters-bv

jobs:
  # ------------------------------------------------------------------
  # Matrix: lint + tests + (on push) build & push docker image, per
  # sub-service in parallel.
  # ------------------------------------------------------------------
  test_and_build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - contract-generator
          - contract-validator
          - clearing-house-stub
    defaults:
      run:
        working-directory: ./server/${{ matrix.service }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install poetry
        run: pip install poetry

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-root --with dev,test

      - name: Run lint checks
        run: |
          poetry run black . --check --diff
          poetry run mypy app

      - name: Run tests
        run: |
          if [ -d "tests" ] || [ -d "app/tests" ]; then
            poetry run pytest
          else
            echo "No tests/ directory — skipping pytest"
          fi

      # ----------------- Build & push image (push only) --------------
      - name: Set up Docker Buildx
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Make versions
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: .
        run: |
          chmod +x ./tools/version.sh
          ./tools/version.sh "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ds-${{ matrix.service }}" "${{ matrix.service }}"
          echo "VERSION_APP=$(cat ./VERSION_APP)" >> $GITHUB_ENV
          echo "DOCKER_IMAGES=$(cat ./DOCKER_IMAGES)" >> $GITHUB_ENV
          echo "DOCKER_TAGS=$(cat ./VERSION_DOCKER)" >> $GITHUB_ENV

      - name: Log into ${{ env.REGISTRY }}
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push docker image
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ env.DOCKER_IMAGES }}
          context: "${{ github.workspace }}/server/${{ matrix.service }}"

  # ------------------------------------------------------------------
  # Publish all three Helm charts sequentially after the matrix
  # finishes. Sequential to avoid the gh-pages branch racing on
  # simultaneous pushes from matrix jobs.
  # ------------------------------------------------------------------
  publish_charts:
    needs: [test_and_build]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: helm-publish-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v3

      # ---- Patch Chart.yaml + values.yaml per service ---------------
      # version.sh derives a unique version string from the git state
      # (e.g. 0.1.0-dev.7.develop.6adf397c on develop, 0.1.0 on tags)
      # and rewrites Chart.yaml and values.yaml in-place before publish.
      # Without this each push would just overwrite 0.1.0.tgz.
      - name: Patch contract-generator chart version
        run: |
          chmod +x ./tools/version.sh
          ./tools/version.sh "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ds-contract-generator" "contract-generator"

      - name: Publish contract-generator chart
        uses: stefanprodan/helm-gh-pages@master
        with:
          token: ${{ github.token }}
          charts_dir: "./server/contract-generator/charts/"
          target_dir: "./helm-charts/contract-generator/"

      - name: Patch contract-validator chart version
        run: ./tools/version.sh "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ds-contract-validator" "contract-validator"

      - name: Publish contract-validator chart
        uses: stefanprodan/helm-gh-pages@master
        with:
          token: ${{ github.token }}
          charts_dir: "./server/contract-validator/charts/"
          target_dir: "./helm-charts/contract-validator/"

      - name: Patch clearing-house-stub chart version
        run: ./tools/version.sh "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ds-clearing-house-stub" "clearing-house-stub"

      - name: Publish clearing-house-stub chart
        uses: stefanprodan/helm-gh-pages@master
        with:
          token: ${{ github.token }}
          charts_dir: "./server/clearing-house-stub/charts/"
          target_dir: "./helm-charts/clearing-house-stub/"
